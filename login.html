<!doctype html>
<html lang="id">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Login - Crembo Media</title>
	<meta name="description" content="Login ke platform Crembo Media.">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
	<style>
		:root {
			--primary:#800000;--primary-dark:#5c0000;--primary-deeper:#3a0000;--primary-light:#a52a2a;
			--accent-gold:#d4a017;--accent-gold-light:#f0c040;
			--bg:#faf8f6;--surface:#ffffff;--ink:#1a1a1a;--ink-secondary:#4a4a4a;--muted:#7a7a7a;
			--line:rgba(128,0,0,0.15);--line-soft:rgba(128,0,0,0.08);--hover:rgba(128,0,0,0.04);
			--shadow-lg:0 20px 60px rgba(128,0,0,0.18),0 8px 20px rgba(0,0,0,0.08);
			--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:24px;
			--transition:0.3s cubic-bezier(0.4,0,0.2,1);
		}
		*{box-sizing:border-box;}
		body{margin:0;font-family:'Inter',-apple-system,sans-serif;background:linear-gradient(135deg,var(--primary-deeper) 0%,var(--primary) 45%,var(--primary-light) 100%);min-height:100vh;display:grid;place-items:center;padding:24px;-webkit-font-smoothing:antialiased;position:relative;overflow:hidden;}
		body::before{content:"";position:absolute;inset:0;background-image:url("IMG_1970.JPG");background-size:cover;background-position:center;opacity:0.08;pointer-events:none;}
		body::after{content:"";position:absolute;inset:0;background:inherit;opacity:0;pointer-events:none;}

		/* Decorative circles */
		.deco-circle{position:absolute;border-radius:50%;pointer-events:none;}
		.deco-1{width:400px;height:400px;background:radial-gradient(circle,rgba(255,255,255,0.05),transparent);top:-120px;right:-80px;}
		.deco-2{width:300px;height:300px;background:radial-gradient(circle,rgba(212,160,23,0.08),transparent);bottom:-80px;left:-60px;}

		/* CARD */
		.auth-card{width:100%;max-width:440px;background:rgba(255,255,255,0.97);border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);padding:40px 40px 36px;animation:slideUp 0.6s cubic-bezier(0.22,1,0.36,1) both;backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.5);position:relative;z-index:2;}

		/* LOGO */
		.auth-logo{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:28px;}
		.auth-logo-img{width:72px;height:72px;background:linear-gradient(135deg,var(--primary-deeper),var(--primary));border-radius:var(--radius-md);display:grid;place-items:center;padding:8px;box-shadow:0 4px 16px rgba(128,0,0,0.3);}
		.auth-logo-img img{max-width:100%;max-height:100%;object-fit:contain;}
		.auth-logo h1{margin:0;font-size:1.15rem;font-weight:800;color:var(--ink);text-align:center;text-transform:uppercase;letter-spacing:0.5px;}
		.auth-logo p{margin:4px 0 0;font-size:0.8rem;color:var(--muted);text-align:center;}

		/* DIVIDER */
		.divider{height:1px;background:var(--line-soft);margin:0 0 28px;}

		/* FORM */
		.auth-title{margin:0 0 6px;font-size:1.35rem;font-weight:800;color:var(--ink);}
		.auth-sub{margin:0 0 28px;font-size:0.88rem;color:var(--muted);}

		.field{display:grid;gap:6px;margin-bottom:18px;}
		.field label{font-size:0.82rem;font-weight:700;color:var(--ink-secondary);text-transform:uppercase;letter-spacing:0.4px;}
		.field-wrap{position:relative;}
		.field input{width:100%;border:1.5px solid var(--line);background:var(--bg);color:var(--ink);padding:12px 16px;font-size:0.9rem;font-family:inherit;border-radius:var(--radius-sm);outline:none;transition:var(--transition);}
		.field input:focus{border-color:var(--primary);background:var(--surface);box-shadow:0 0 0 3px rgba(128,0,0,0.1);}
		.field input.error{border-color:#dc2626;box-shadow:0 0 0 3px rgba(220,38,38,0.1);}
		.toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:0.78rem;font-weight:700;color:var(--muted);font-family:inherit;transition:var(--transition);padding:4px;}
		.toggle-pw:hover{color:var(--primary);}

		.field-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
		.forgot-link{font-size:0.82rem;color:var(--primary);font-weight:600;transition:var(--transition);}
		.forgot-link:hover{color:var(--primary-dark);text-decoration:underline;}

		.role-tabs{display:flex;gap:6px;border:1.5px solid var(--line);border-radius:var(--radius-sm);padding:4px;background:var(--bg);margin-bottom:20px;}
		.role-tab{flex:1;text-align:center;padding:8px 12px;font-size:0.82rem;font-weight:600;border-radius:calc(var(--radius-sm) - 2px);cursor:pointer;border:none;background:transparent;font-family:inherit;color:var(--muted);transition:var(--transition);}
		.role-tab.active{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;box-shadow:0 2px 8px rgba(128,0,0,0.2);}

		.btn-submit{display:block;width:100%;border:none;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;padding:14px;font-size:0.96rem;font-weight:700;border-radius:var(--radius-sm);cursor:pointer;font-family:inherit;transition:var(--transition);box-shadow:0 4px 12px rgba(128,0,0,0.25);letter-spacing:0.3px;margin-top:6px;}
		.btn-submit:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(128,0,0,0.35);}
		.btn-submit:active{transform:translateY(0);}

		.auth-footer{margin-top:24px;text-align:center;font-size:0.84rem;color:var(--muted);}
		.auth-footer a{color:var(--primary);font-weight:600;transition:var(--transition);}
		.auth-footer a:hover{color:var(--primary-dark);text-decoration:underline;}

		/* BACK LINK */
		.back-home{position:absolute;top:24px;left:50%;transform:translateX(-50%);z-index:10;display:flex;align-items:center;gap:6px;color:rgba(255,255,255,0.85);font-size:0.85rem;font-weight:600;font-family:'Inter',sans-serif;text-decoration:none;transition:var(--transition);}
		.back-home:hover{color:#fff;}

		/* ALERT */
		.alert{padding:12px 14px;border-radius:var(--radius-sm);font-size:0.85rem;margin-bottom:18px;display:none;}
		.alert.alert-error{background:rgba(220,38,38,0.08);border:1px solid rgba(220,38,38,0.25);color:#991b1b;}
		.alert.alert-success{background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.25);color:#166534;}
		.alert.show{display:block;}

		@keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
		@media(max-width:480px){.auth-card{padding:28px 24px 24px;}}
	</style>
</head>
<body>
	<div class="deco-circle deco-1"></div>
	<div class="deco-circle deco-2"></div>

	<a class="back-home" href="home.html">← Kembali ke Beranda</a>

	<section class="auth-card" aria-label="Form Login">
		<div class="auth-logo">
			<div class="auth-logo-img">
				<img src="LOGO CREMBO PUTIH yg bagus.png" alt="Logo Crembo Media">
			</div>
			<h1>Crew Multimedia Baciro</h1>
			<p>Jl. Melati Wetan 47, Baciro, Yogyakarta</p>
		</div>

		<div class="divider"></div>

		<h2 class="auth-title">Selamat Datang</h2>
		<p class="auth-sub">Masuk ke akun Crembo Media Anda</p>

		<!-- Role Tabs -->
		<div class="role-tabs" role="tablist" aria-label="Pilih role login">
			<button class="role-tab active" type="button" id="tabAnggota" onclick="setRole('anggota')">Anggota</button>
			<button class="role-tab" type="button" id="tabAdmin" onclick="setRole('admin')">Admin</button>
			<button class="role-tab" type="button" id="tabSuperAdmin" onclick="setRole('super_admin')">Super Admin</button>
		</div>

		<div id="alert" class="alert alert-error" role="alert"></div>

		<form id="loginForm" novalidate>
			<div class="field">
				<label for="loginIdentifier">Email / No. HP</label>
				<input id="loginIdentifier" type="text" placeholder="Email atau nomor HP aktif Anda" autocomplete="username" required>
			</div>
			<div class="field">
				<div class="field-row">
					<label for="loginPassword">Password</label>
					<a class="forgot-link" href="forgot-password.html">Lupa sandi?</a>
				</div>
				<div class="field-wrap">
					<input id="loginPassword" type="password" placeholder="Masukkan password Anda" autocomplete="current-password" required>
					<button class="toggle-pw" type="button" id="togglePw" aria-label="Tampilkan/sembunyikan password">Tampil</button>
				</div>
			</div>

			<button class="btn-submit" type="submit" id="loginBtn">Masuk</button>
		</form>

		<div class="auth-footer">
			Belum punya akun? <a href="form-pendaftaran.html">Daftar sekarang</a>
		</div>
	</section>

	<script>
	const SESSION_KEY = "crembo-login-session";
	const MEMBER_KEY  = "crembo-members";

	// ─── Seed dummy members ──────────────────────────────────────────────────────
	(function seedMembers() {
		const ex = localStorage.getItem(MEMBER_KEY);
		if (ex) { try { if (JSON.parse(ex).length) return; } catch(e){} }
		const members = [
			{ id:"m1", name:"Rikha Putri",  email:"rikha@crembo.id",  phone:"081234567801", role:"anggota", status:"Aktif", password:"Crembo2026!" },
			{ id:"m2", name:"Lisa Andriani", email:"lisa@crembo.id",   phone:"081234567802", role:"anggota", status:"Aktif", password:"Crembo2026!" },
			{ id:"m3", name:"Evan Budi",     email:"evan@crembo.id",   phone:"081234567803", role:"anggota", status:"Aktif", password:"Crembo2026!" },
			{ id:"m4", name:"Admin Tyas",    email:"admin@crembo.id",  phone:"081234567890", role:"admin",   status:"Aktif", password:"AdminCrembo1!" },
			{ id:"m5", name:"Super Admin",   email:"superadmin@crembo.id", phone:"081234567999", role:"super_admin", status:"Aktif", password:"Super@dmin1!" },
		];
		localStorage.setItem(MEMBER_KEY, JSON.stringify(members));
	})();

	let selectedRole = "anggota";
	const alertEl = document.getElementById("alert");
	const loginForm = document.getElementById("loginForm");
	const loginIdentifier = document.getElementById("loginIdentifier");
	const loginPassword   = document.getElementById("loginPassword");
	const togglePw        = document.getElementById("togglePw");

	function setRole(role) {
		selectedRole = role;
		document.querySelectorAll(".role-tab").forEach(t => t.classList.remove("active"));
		document.getElementById("tab" + (role === "anggota" ? "Anggota" : role === "admin" ? "Admin" : "SuperAdmin")).classList.add("active");
		hideAlert();
	}

	function showAlert(msg, type) {
		alertEl.textContent = msg;
		alertEl.className = "alert alert-" + (type||"error") + " show";
	}
	function hideAlert() { alertEl.className = "alert alert-error"; }

	togglePw.addEventListener("click", function() {
		const isText = loginPassword.type === "text";
		loginPassword.type = isText ? "password" : "text";
		togglePw.textContent = isText ? "Tampil" : "Sembunyikan";
	});

	loginForm.addEventListener("submit", function(e) {
		e.preventDefault();
		hideAlert();
		const identifier = loginIdentifier.value.trim().toLowerCase();
		const password   = loginPassword.value;

		if (!identifier || !password) { showAlert("Mohon isi semua kolom."); return; }

		let members = [];
		try { members = JSON.parse(localStorage.getItem(MEMBER_KEY) || "[]"); } catch(e){}

		const member = members.find(m => {
			const emailMatch = (m.email||"").toLowerCase() === identifier;
			const phoneMatch = (m.phone||"") === identifier.replace(/[-\s]/g,"");
			return (emailMatch || phoneMatch) && m.role === selectedRole;
		});

		if (!member || member.status !== "Aktif") { showAlert("Akun tidak ditemukan atau tidak aktif."); return; }
		if (member.password !== password) { showAlert("Password salah."); return; }

		const session = {
			memberId: member.id,
			name: member.name,
			identifier: member.email || member.phone,
			identifierType: member.email ? "email" : "no_hp",
			role: member.role,
			loginAt: new Date().toISOString()
		};
		localStorage.setItem(SESSION_KEY, JSON.stringify(session));

		showAlert("Login berhasil! Mengalihkan...", "success");
		setTimeout(() => {
			if (member.role === "admin" || member.role === "super_admin") {
				window.location.href = "dashboard.html?role=" + member.role;
			} else {
				window.location.href = "home.html?session=active";
			}
		}, 1200);
	});
	</script>
</body>
</html>
