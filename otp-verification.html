<!doctype html>
<html lang="id">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Verifikasi OTP - Crembo Media</title>
	<meta name="description" content="Verifikasi kode OTP untuk reset password akun Crembo Media.">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
	<style>
		:root{--primary:#800000;--primary-dark:#5c0000;--primary-deeper:#3a0000;--primary-light:#a52a2a;--accent-gold:#d4a017;--bg:#faf8f6;--surface:#ffffff;--ink:#1a1a1a;--ink-secondary:#4a4a4a;--muted:#7a7a7a;--line:rgba(128,0,0,0.15);--line-soft:rgba(128,0,0,0.08);--shadow-lg:0 20px 60px rgba(128,0,0,0.18),0 8px 20px rgba(0,0,0,0.08);--radius-sm:8px;--radius-md:12px;--radius-xl:24px;--transition:0.3s cubic-bezier(0.4,0,0.2,1);}
		*{box-sizing:border-box;}
		body{margin:0;font-family:'Inter',-apple-system,sans-serif;background:linear-gradient(135deg,var(--primary-deeper) 0%,var(--primary) 45%,var(--primary-light) 100%);min-height:100vh;display:grid;place-items:center;padding:24px;-webkit-font-smoothing:antialiased;position:relative;overflow:hidden;}
		body::before{content:"";position:absolute;inset:0;background-image:url("IMG_1970.JPG");background-size:cover;background-position:center;opacity:0.08;pointer-events:none;}
		.deco-circle{position:absolute;border-radius:50%;pointer-events:none;}
		.deco-1{width:400px;height:400px;background:radial-gradient(circle,rgba(255,255,255,0.05),transparent);top:-120px;right:-80px;}
		.deco-2{width:300px;height:300px;background:radial-gradient(circle,rgba(212,160,23,0.08),transparent);bottom:-80px;left:-60px;}

		.auth-card{width:100%;max-width:440px;background:rgba(255,255,255,0.97);border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);padding:40px;animation:slideUp 0.6s cubic-bezier(0.22,1,0.36,1) both;position:relative;z-index:2;}

		.auth-logo{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:28px;}
		.auth-logo-img{width:64px;height:64px;background:linear-gradient(135deg,var(--primary-deeper),var(--primary));border-radius:var(--radius-md);display:grid;place-items:center;padding:8px;box-shadow:0 4px 16px rgba(128,0,0,0.3);}
		.auth-logo-img img{max-width:100%;max-height:100%;object-fit:contain;}
		.auth-logo h1{margin:0;font-size:1.05rem;font-weight:800;color:var(--ink);text-transform:uppercase;letter-spacing:0.5px;}

		.step-indicator{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:28px;}
		.step-dot{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;font-size:0.8rem;font-weight:700;border:2px solid var(--line);color:var(--muted);background:var(--bg);transition:var(--transition);}
		.step-dot.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 2px 8px rgba(128,0,0,0.3);}
		.step-dot.done{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;border-color:var(--primary);}
		.step-line{flex:1;height:2px;background:var(--line-soft);max-width:48px;border-radius:2px;}
		.step-line.done{background:var(--primary);}

		.divider{height:1px;background:var(--line-soft);margin:0 0 28px;}
		.auth-title{margin:0 0 6px;font-size:1.3rem;font-weight:800;color:var(--ink);}
		.auth-sub{margin:0 0 24px;font-size:0.88rem;color:var(--muted);line-height:1.6;}

		/* OTP BOXES */
		.otp-hint{background:rgba(128,0,0,0.06);border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px 14px;font-size:0.85rem;color:var(--ink-secondary);margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
		.otp-code{font-size:1.4rem;font-weight:900;letter-spacing:6px;color:var(--primary);font-family:monospace;}
		.otp-timer-label{font-size:0.78rem;color:var(--muted);}

		.otp-inputs{display:flex;gap:10px;justify-content:center;margin-bottom:28px;}
		.otp-input{width:52px;height:60px;border:2px solid var(--line);border-radius:var(--radius-sm);font-size:1.6rem;font-weight:700;text-align:center;font-family:inherit;outline:none;color:var(--ink);background:var(--bg);transition:var(--transition);caret-color:transparent;}
		.otp-input:focus{border-color:var(--primary);background:var(--surface);box-shadow:0 0 0 3px rgba(128,0,0,0.1);}
		.otp-input.filled{border-color:var(--primary);background:rgba(128,0,0,0.04);color:var(--primary);}

		.btn-submit{display:block;width:100%;border:none;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;padding:14px;font-size:0.96rem;font-weight:700;border-radius:var(--radius-sm);cursor:pointer;font-family:inherit;transition:var(--transition);box-shadow:0 4px 12px rgba(128,0,0,0.25);}
		.btn-submit:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(128,0,0,0.35);}
		.btn-submit:disabled{opacity:0.55;cursor:not-allowed;transform:none;}

		.alert{padding:12px 14px;border-radius:var(--radius-sm);font-size:0.85rem;margin-bottom:18px;display:none;}
		.alert.error{background:rgba(220,38,38,0.08);border:1px solid rgba(220,38,38,0.25);color:#991b1b;}
		.alert.success{background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.25);color:#166534;}
		.alert.show{display:block;}

		.resend-row{text-align:center;margin-top:18px;font-size:0.84rem;color:var(--muted);}
		.resend-btn{background:none;border:none;cursor:pointer;font-size:0.84rem;font-weight:700;color:var(--primary);font-family:inherit;transition:var(--transition);padding:0;}
		.resend-btn:disabled{color:var(--muted);cursor:not-allowed;}
		.back-home{position:absolute;top:24px;left:50%;transform:translateX(-50%);z-index:10;color:rgba(255,255,255,0.85);font-size:0.85rem;font-weight:600;font-family:'Inter',sans-serif;text-decoration:none;transition:var(--transition);}
		.back-home:hover{color:#fff;}

		@keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
		@media(max-width:480px){.auth-card{padding:28px 20px;}.otp-input{width:42px;height:52px;font-size:1.3rem;}.otp-inputs{gap:6px;}}
	</style>
</head>
<body>
	<div class="deco-circle deco-1"></div>
	<div class="deco-circle deco-2"></div>
	<a class="back-home" href="home.html">← Kembali ke Beranda</a>

	<section class="auth-card" aria-label="Verifikasi OTP">
		<div class="auth-logo">
			<div class="auth-logo-img">
				<img src="LOGO CREMBO PUTIH yg bagus.png" alt="Logo Crembo Media">
			</div>
			<h1>Crembo Media</h1>
		</div>

		<div class="step-indicator">
			<div class="step-dot done">✓</div>
			<div class="step-line done"></div>
			<div class="step-dot active">2</div>
			<div class="step-line"></div>
			<div class="step-dot">3</div>
		</div>

		<div class="divider"></div>

		<h2 class="auth-title">Verifikasi OTP</h2>
		<p class="auth-sub">Kode OTP telah dikirim. Masukkan kode 6 digit di bawah ini. Kode berlaku selama 5 menit.</p>

		<!-- OTP hint for mockup -->
		<div class="otp-hint">
			<span>Kode OTP demo: <span class="otp-code" id="otpDisplay">–</span></span>
			<span class="otp-timer-label">Sisa waktu: <strong id="timerDisplay">5:00</strong></span>
		</div>

		<div id="alertOtp" class="alert error"></div>

		<div class="otp-inputs" id="otpInputs" role="group" aria-label="Input kode OTP">
			<input class="otp-input" type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" aria-label="Digit OTP 1" id="otp0">
			<input class="otp-input" type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" aria-label="Digit OTP 2" id="otp1">
			<input class="otp-input" type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" aria-label="Digit OTP 3" id="otp2">
			<input class="otp-input" type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" aria-label="Digit OTP 4" id="otp3">
			<input class="otp-input" type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" aria-label="Digit OTP 5" id="otp4">
			<input class="otp-input" type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" aria-label="Digit OTP 6" id="otp5">
		</div>

		<button class="btn-submit" id="verifyBtn" type="button" disabled>Verifikasi</button>

		<div class="resend-row">
			Tidak menerima kode?
			<button class="resend-btn" id="resendBtn" type="button" disabled>Kirim ulang (<span id="resendTimer">60</span>s)</button>
		</div>
	</section>

	<script>
	const OTP_KEY = "crembo-otp-session";

	// Load OTP session
	let otpSession = null;
	try { otpSession = JSON.parse(localStorage.getItem(OTP_KEY) || "null"); } catch(e){}

	const otpDisplay   = document.getElementById("otpDisplay");
	const timerDisplay = document.getElementById("timerDisplay");
	const verifyBtn    = document.getElementById("verifyBtn");
	const resendBtn    = document.getElementById("resendBtn");
	const resendTimer  = document.getElementById("resendTimer");
	const alertEl      = document.getElementById("alertOtp");

	function showAlert(msg, type) { alertEl.textContent=msg; alertEl.className="alert "+(type||"error")+" show"; }
	function hideAlert() { alertEl.className="alert error"; }

	// Display OTP (mockup only)
	if (otpSession && otpSession.otp) {
		otpDisplay.textContent = otpSession.otp;
	} else {
		otpDisplay.textContent = "–";
		showAlert("Sesi OTP tidak ditemukan. Silakan ulangi dari halaman Lupa Sandi.","error");
	}

	// OTP countdown
	let otpInterval = null;
	if (otpSession) {
		otpInterval = setInterval(function() {
			const remaining = Math.max(0, Math.floor((otpSession.expiry - Date.now()) / 1000));
			const m = Math.floor(remaining / 60), s = remaining % 60;
			timerDisplay.textContent = m + ":" + String(s).padStart(2,"0");
			if (remaining === 0) { clearInterval(otpInterval); showAlert("Kode OTP sudah kedaluwarsa. Silakan kirim ulang.","error"); }
		}, 1000);
	}

	// Resend countdown
	let resendCount = 60;
	const resendInterval = setInterval(function() {
		resendCount--;
		resendTimer.textContent = resendCount;
		if (resendCount <= 0) { clearInterval(resendInterval); resendBtn.disabled=false; resendBtn.innerHTML="Kirim ulang OTP"; }
	}, 1000);

	resendBtn.addEventListener("click", function() {
		window.location.href = "forgot-password.html";
	});

	// OTP Inputs logic
	const inputs = Array.from(document.querySelectorAll(".otp-input"));
	inputs.forEach(function(input, i) {
		input.addEventListener("input", function() {
			input.value = input.value.replace(/[^0-9]/g,"");
			input.classList.toggle("filled", input.value !== "");
			if (input.value && i < inputs.length - 1) inputs[i+1].focus();
			verifyBtn.disabled = inputs.some(inp => !inp.value);
		});
		input.addEventListener("keydown", function(e) {
			if (e.key === "Backspace" && !input.value && i > 0) {
				inputs[i-1].value = "";
				inputs[i-1].classList.remove("filled");
				inputs[i-1].focus();
			}
		});
		input.addEventListener("paste", function(e) {
			e.preventDefault();
			const text = (e.clipboardData || window.clipboardData).getData("text").replace(/\D/g,"");
			text.split("").slice(0,6).forEach(function(ch, idx) {
				if (inputs[idx]) { inputs[idx].value=ch; inputs[idx].classList.add("filled"); }
			});
			verifyBtn.disabled = inputs.some(inp => !inp.value);
			const nxt = inputs.find(inp => !inp.value); if(nxt) nxt.focus();
		});
	});

	verifyBtn.addEventListener("click", function() {
		hideAlert();
		const enteredOtp = inputs.map(i => i.value).join("");
		if (!otpSession) { showAlert("Sesi OTP tidak ditemukan."); return; }
		if (Date.now() > otpSession.expiry) { showAlert("Kode OTP sudah kedaluwarsa."); return; }
		if (enteredOtp !== otpSession.otp) { showAlert("Kode OTP salah."); return; }
		otpSession.used = true;
		localStorage.setItem(OTP_KEY, JSON.stringify(otpSession));
		showAlert("OTP terverifikasi! Mengalihkan ke halaman reset sandi...","success");
		setTimeout(() => window.location.href = "reset-password.html", 1200);
	});
	</script>
</body>
</html>
