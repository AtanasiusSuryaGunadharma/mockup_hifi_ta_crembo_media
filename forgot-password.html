<!doctype html>
<html lang="id">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Lupa Sandi - Crembo Media</title>
	<meta name="description" content="Permintaan reset password akun Crembo Media.">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
	<style>
		:root{--primary:#800000;--primary-dark:#5c0000;--primary-deeper:#3a0000;--primary-light:#a52a2a;--accent-gold:#d4a017;--accent-gold-light:#f0c040;--bg:#faf8f6;--surface:#ffffff;--ink:#1a1a1a;--ink-secondary:#4a4a4a;--muted:#7a7a7a;--line:rgba(128,0,0,0.15);--line-soft:rgba(128,0,0,0.08);--shadow-lg:0 20px 60px rgba(128,0,0,0.18),0 8px 20px rgba(0,0,0,0.08);--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:24px;--transition:0.3s cubic-bezier(0.4,0,0.2,1);}
		*{box-sizing:border-box;}
		body{margin:0;font-family:'Inter',-apple-system,sans-serif;background:linear-gradient(135deg,var(--primary-deeper) 0%,var(--primary) 45%,var(--primary-light) 100%);min-height:100vh;display:grid;place-items:center;padding:24px;-webkit-font-smoothing:antialiased;position:relative;overflow:hidden;}
		body::before{content:"";position:absolute;inset:0;background-image:url("IMG_1970.JPG");background-size:cover;background-position:center;opacity:0.08;pointer-events:none;}
		.deco-circle{position:absolute;border-radius:50%;pointer-events:none;}
		.deco-1{width:400px;height:400px;background:radial-gradient(circle,rgba(255,255,255,0.05),transparent);top:-120px;right:-80px;}
		.deco-2{width:300px;height:300px;background:radial-gradient(circle,rgba(212,160,23,0.08),transparent);bottom:-80px;left:-60px;}

		.auth-card{width:100%;max-width:440px;background:rgba(255,255,255,0.97);border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);padding:40px;animation:slideUp 0.6s cubic-bezier(0.22,1,0.36,1) both;position:relative;z-index:2;}

		.auth-logo{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:28px;}
		.auth-logo-img{width:64px;height:64px;background:linear-gradient(135deg,var(--primary-deeper),var(--primary));border-radius:var(--radius-md);display:grid;place-items:center;padding:8px;box-shadow:0 4px 16px rgba(128,0,0,0.3);}
		.auth-logo-img img{max-width:100%;max-height:100%;object-fit:contain;}
		.auth-logo h1{margin:0;font-size:1.05rem;font-weight:800;color:var(--ink);text-align:center;text-transform:uppercase;letter-spacing:0.5px;}

		.step-indicator{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:28px;}
		.step-dot{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;font-size:0.8rem;font-weight:700;border:2px solid var(--line);color:var(--muted);background:var(--bg);transition:var(--transition);}
		.step-dot.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 2px 8px rgba(128,0,0,0.3);}
		.step-dot.done{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;border-color:var(--primary);}
		.step-line{flex:1;height:2px;background:var(--line-soft);max-width:48px;border-radius:2px;}
		.step-line.done{background:var(--primary);}

		.divider{height:1px;background:var(--line-soft);margin:0 0 28px;}
		.auth-title{margin:0 0 6px;font-size:1.3rem;font-weight:800;color:var(--ink);}
		.auth-sub{margin:0 0 28px;font-size:0.88rem;color:var(--muted);line-height:1.6;}
		.field{display:grid;gap:6px;margin-bottom:18px;}
		.field label{font-size:0.82rem;font-weight:700;color:var(--ink-secondary);text-transform:uppercase;letter-spacing:0.4px;}
		.field input{width:100%;border:1.5px solid var(--line);background:var(--bg);color:var(--ink);padding:12px 16px;font-size:0.9rem;font-family:inherit;border-radius:var(--radius-sm);outline:none;transition:var(--transition);}
		.field input:focus{border-color:var(--primary);background:var(--surface);box-shadow:0 0 0 3px rgba(128,0,0,0.1);}

		.btn-submit{display:block;width:100%;border:none;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;padding:14px;font-size:0.96rem;font-weight:700;border-radius:var(--radius-sm);cursor:pointer;font-family:inherit;transition:var(--transition);box-shadow:0 4px 12px rgba(128,0,0,0.25);}
		.btn-submit:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(128,0,0,0.35);}

		.alert{padding:12px 14px;border-radius:var(--radius-sm);font-size:0.85rem;margin-bottom:18px;display:none;}
		.alert.error{background:rgba(220,38,38,0.08);border:1px solid rgba(220,38,38,0.25);color:#991b1b;}
		.alert.success{background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.25);color:#166534;}
		.alert.show{display:block;}
		.back-to-login{display:block;text-align:center;margin-top:20px;font-size:0.85rem;color:var(--primary);font-weight:600;text-decoration:none;transition:var(--transition);}
		.back-to-login:hover{color:var(--primary-dark);text-decoration:underline;}
		.back-home{position:absolute;top:24px;left:50%;transform:translateX(-50%);z-index:10;color:rgba(255,255,255,0.85);font-size:0.85rem;font-weight:600;font-family:'Inter',sans-serif;text-decoration:none;transition:var(--transition);}
		.back-home:hover{color:#fff;}

		.info-box{background:rgba(212,160,23,0.08);border:1px solid rgba(212,160,23,0.3);border-radius:var(--radius-sm);padding:12px 14px;font-size:0.85rem;color:#7c5c0a;margin-bottom:20px;line-height:1.6;}

		@keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
		@media(max-width:480px){.auth-card{padding:28px 22px;}}
	</style>
</head>
<body>
	<div class="deco-circle deco-1"></div>
	<div class="deco-circle deco-2"></div>
	<a class="back-home" href="home.html">← Kembali ke Beranda</a>

	<section class="auth-card" aria-label="Form Lupa Sandi">
		<div class="auth-logo">
			<div class="auth-logo-img">
				<img src="LOGO CREMBO PUTIH yg bagus.png" alt="Logo Crembo Media">
			</div>
			<h1>Crembo Media</h1>
		</div>

		<!-- Step indicator -->
		<div class="step-indicator" aria-label="Langkah lupa sandi">
			<div class="step-dot active" id="step1">1</div>
			<div class="step-line" id="line1"></div>
			<div class="step-dot" id="step2">2</div>
			<div class="step-line" id="line2"></div>
			<div class="step-dot" id="step3">3</div>
		</div>

		<div class="divider"></div>

		<!-- STEP 1: Input email/phone -->
		<div id="panelStep1">
			<h2 class="auth-title">Lupa Sandi?</h2>
			<p class="auth-sub">Masukkan email atau nomor HP yang terdaftar. Kami akan mengirimkan kode OTP untuk verifikasi.</p>

			<div class="info-box">ℹ️ Untuk keperluan demo, kode OTP akan ditampilkan langsung di halaman verifikasi.</div>

			<div id="alert1" class="alert error"></div>

			<form id="forgotForm" novalidate>
				<div class="field">
					<label for="forgotIdentifier">Email / No. HP</label>
					<input id="forgotIdentifier" type="text" placeholder="Email atau nomor HP terdaftar" required>
				</div>
				<button class="btn-submit" type="submit">Kirim Kode OTP</button>
			</form>
			<a class="back-to-login" href="login.html">← Kembali ke Login</a>
		</div>
	</section>

	<script>
	const MEMBER_KEY  = "crembo-members";
	const OTP_KEY     = "crembo-otp-session";

	function showAlert(id, msg, type) {
		const el = document.getElementById(id);
		el.textContent = msg;
		el.className = "alert " + (type||"error") + " show";
	}

	document.getElementById("forgotForm").addEventListener("submit", function(e) {
		e.preventDefault();
		const identifier = document.getElementById("forgotIdentifier").value.trim().toLowerCase();
		if (!identifier) { showAlert("alert1","Mohon isi email atau nomor HP."); return; }

		let members = [];
		try { members = JSON.parse(localStorage.getItem(MEMBER_KEY) || "[]"); } catch(e){}

		const member = members.find(m => {
			return (m.email||"").toLowerCase() === identifier ||
			       (m.phone||"").replace(/[-\s]/g,"") === identifier.replace(/[-\s]/g,"");
		});

		if (!member || member.status !== "Aktif") {
			showAlert("alert1","Akun dengan identitas tersebut tidak ditemukan atau tidak aktif.","error");
			return;
		}

		// Generate OTP
		const otp = String(Math.floor(100000 + Math.random() * 900000));
		const otpSession = {
			identifier: identifier,
			memberId: member.id,
			otp: otp,
			expiry: Date.now() + 5 * 60 * 1000, // 5 menit
			used: false
		};
		localStorage.setItem(OTP_KEY, JSON.stringify(otpSession));

		// Redirect to OTP page
		window.location.href = "otp-verification.html?from=forgot";
	});
	</script>
</body>
</html>
